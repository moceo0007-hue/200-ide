      &lt;div class=&quot;ds-compare-note&quot;&gt;&lt;strong&gt;Lecture honnête&lt;/strong&gt;&lt;p&gt;#127 a la plus grande thèse d’infrastructure, mais #73 maximise aujourd’hui tes chances de parler à des clients, vendre manuellement et produire une donnée défendable. #65 est le chemin le plus court vers du revenu.&lt;/p&gt;&lt;/div&gt;

    &lt;section class=&quot;ds-view ds-section&quot; id=&quot;ds-panel-plan&quot; data-panel=&quot;plan&quot; hidden&gt;
      &lt;header class=&quot;ds-section-heading&quot;&gt;
        &lt;div&gt;&lt;span class=&quot;ds-kicker&quot;&gt;Exécution&lt;/span&gt;&lt;h2&gt;90 jours pour passer d’une idée à un dossier YC crédible&lt;/h2&gt;&lt;p&gt;Le formulaire vient après la preuve : un problème précis, un produit construit, des utilisateurs et une vitesse d’apprentissage visible.&lt;/p&gt;&lt;/div&gt;
        &lt;span class=&quot;ds-pill&quot;&gt;Budget cible ≤ 4 000 €&lt;/span&gt;
      &lt;/header&gt;

      &lt;div class=&quot;ds-compare-note&quot;&gt;&lt;strong&gt;Point de vérité&lt;/strong&gt;&lt;p&gt;YC finance des fondateurs solos, mais précise que c’est plus difficile. Pour une startup technologique, le cœur du produit doit être construit en interne. Ton objectif parallèle est donc de démontrer ta capacité de construction avec no-code/IA ou de convaincre un cofondateur technique grâce à une traction réelle.&lt;/p&gt;&lt;/div&gt;

      &lt;div class=&quot;ds-plan-grid&quot;&gt;
        &lt;div class=&quot;ds-timeline&quot;&gt;
          &lt;div class=&quot;ds-phase&quot;&gt;&lt;strong&gt;Jours 1–15&lt;/strong&gt;&lt;div&gt;&lt;strong&gt;Choisir un seul wedge.&lt;/strong&gt; Mener 25 entretiens sur des dossiers réels, obtenir les données d’entrée et chiffrer la perte. Sortie : cinq clients acceptent un test manuel.&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;ds-phase&quot;&gt;&lt;strong&gt;Jours 16–30&lt;/strong&gt;&lt;div&gt;&lt;strong&gt;Vendre avant d’automatiser.&lt;/strong&gt; Exécuter le service avec formulaire, tableur, e-mail ou WhatsApp. Sortie : deux pilotes payants significatifs, pas une simple liste d’attente.&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;ds-phase&quot;&gt;&lt;strong&gt;Jours 31–60&lt;/strong&gt;&lt;div&gt;&lt;strong&gt;Construire le noyau.&lt;/strong&gt; Automatiser l’étape répétée par tous les pilotes. Mesurer temps économisé, argent récupéré ou erreurs évitées chaque semaine.&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;ds-phase&quot;&gt;&lt;strong&gt;Jours 61–75&lt;/strong&gt;&lt;div&gt;&lt;strong&gt;Prouver la répétition.&lt;/strong&gt; Viser dix clients actifs ou deux pilotes entreprise avec usage hebdomadaire. Documenter revenu, rétention et vitesse de progression.&lt;/div&gt;&lt;/div&gt;
          &lt;div class=&quot;ds-phase&quot;&gt;&lt;strong&gt;Jours 76–90&lt;/strong&gt;&lt;div&gt;&lt;strong&gt;Candidater factuellement.&lt;/strong&gt; Une phrase produit, insight propriétaire, démo, chiffres bottom-up, obstacle principal et théorie claire pour le franchir.&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;

            &lt;label class=&quot;ds-check&quot;&gt;&lt;input type=&quot;checkbox&quot; data-proof=&quot;paid&quot;&gt;&lt;span&gt;Au moins deux clients ont payé un pilote.&lt;/span&gt;&lt;/label&gt;
            &lt;label class=&quot;ds-check&quot;&gt;&lt;input type=&quot;checkbox&quot; data-proof=&quot;usage&quot;&gt;&lt;span&gt;Le produit ou service est utilisé chaque semaine.&lt;/span&gt;&lt;/label&gt;
            &lt;label class=&quot;ds-check&quot;&gt;&lt;input type=&quot;checkbox&quot; data-proof=&quot;metric&quot;&gt;&lt;span&gt;Une métrique prouve l’argent ou le temps gagné.&lt;/span&gt;&lt;/label&gt;
            &lt;label class=&quot;ds-check&quot;&gt;&lt;input type=&quot;checkbox&quot; data-proof=&quot;demo&quot;&gt;&lt;span&gt;Une démo courte montre le cœur du produit.&lt;/span&gt;&lt;/label&gt;
            &lt;label class=&quot;ds-check&quot;&gt;&lt;input type=&quot;checkbox&quot; data-proof=&quot;build&quot;&gt;&lt;span&gt;Je peux expliquer qui construit et pourquoi vite.&lt;/span&gt;&lt;/label&gt;
            &lt;label class=&quot;ds-check&quot;&gt;&lt;input type=&quot;checkbox&quot; data-proof=&quot;world&quot;&gt;&lt;span&gt;L’expansion mondiale tient en trois étapes logiques.&lt;/span&gt;&lt;/label&gt;
          &lt;/div&gt;
        &lt;/aside&gt;

    const rankList = root.querySelector(&#x27;#ds-yc-table&#x27;);
    const detail = root.querySelector(&#x27;#ds-yc-detail&#x27;);
    const categorySelect = root.querySelector(&#x27;#ds-category&#x27;);

    const marketSelect = root.querySelector(&#x27;#ds-market&#x27;);
    const difficultySelect = root.querySelector(&#x27;#ds-difficulty&#x27;);
    const ideaList = root.querySelector(&#x27;#ds-idea-list&#x27;);
    const count = root.querySelector(&#x27;#ds-count&#x27;);
    const loadMore = root.querySelector(&#x27;#ds-load-more&#x27;);
    const filterCount = root.querySelector(&#x27;#ds-filter-count&#x27;);
    const categories = [...new Set(ideas.map(item =&gt; item.category))];
    const escapeHtml = value =&gt; String(value ?? &#x27;&#x27;).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, char =&gt; ({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#39;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;}[char]));
    const series = index =&gt; `var(--viz-series-${((index - 1) % 6) + 1})`;
    let selectedYcId = 73;
    let visibleIdeas = 20;
    let filteredIdeas = ideas;

    function openView(view, scroll = false) {
      root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(candidate =&gt; {
        const active = candidate.dataset.view === view;
        candidate.setAttribute(&#x27;aria-pressed&#x27;, String(active));
        candidate.classList.toggle(&#x27;btn-primary&#x27;, active);
      });
      let activePanel = null;
      root.querySelectorAll(&#x27;[data-panel]&#x27;).forEach(panel =&gt; {
        panel.hidden = panel.dataset.panel !== view;
        if (!panel.hidden) activePanel = panel;
      });
      if (scroll &amp;&amp; activePanel) {
        const reduceMotion = window.matchMedia &amp;&amp; window.matchMedia(&#x27;(prefers-reduced-motion: reduce)&#x27;).matches;
        activePanel.scrollIntoView({behavior: reduceMotion ? &#x27;auto&#x27; : &#x27;smooth&#x27;, block: &#x27;start&#x27;});
      }
    }

    function renderYcList() {
      rankList.innerHTML = ycIdeas.map(item =&gt; `
        &lt;button class=&quot;btn ds-rank-tile&quot; type=&quot;button&quot; data-yc-id=&quot;${item.id}&quot; aria-current=&quot;${item.id === selectedYcId}&quot; style=&quot;--ds-cat:${series(item.rank)}&quot;&gt;
          &lt;span class=&quot;ds-rank-number&quot;&gt;${item.rank}&lt;/span&gt;
          &lt;span class=&quot;ds-rank-name&quot;&gt;&lt;strong&gt;#${item.id} ${escapeHtml(item.name)}&lt;/strong&gt;&lt;span class=&quot;text-muted&quot;&gt;${escapeHtml(item.angle)}&lt;/span&gt;&lt;/span&gt;
          &lt;span class=&quot;ds-score&quot;&gt;${item.score}&lt;/span&gt;
        &lt;/button&gt;`).join(&#x27;&#x27;);
      rankList.querySelectorAll(&#x27;[data-yc-id]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; selectYc(Number(button.dataset.ycId), true)));
    }

    function selectYc(id, announce = false) {
      const item = ycIdeas.find(candidate =&gt; candidate.id === id) || ycIdeas[0];
      selectedYcId = item.id;
      rankList.querySelectorAll(&#x27;[data-yc-id]&#x27;).forEach(button =&gt; button.setAttribute(&#x27;aria-current&#x27;, String(Number(button.dataset.ycId) === item.id)));
      const hasDetailedPlan = validationPlans.some(plan =&gt; plan.id === item.id);
      detail.innerHTML = `
        &lt;div class=&quot;ds-detail-head&quot;&gt;
          &lt;div&gt;&lt;div class=&quot;ds-badge-row&quot;&gt;&lt;span class=&quot;ds-pill ds-pill-primary&quot;&gt;#${item.id}&lt;/span&gt;&lt;span class=&quot;ds-pill&quot;&gt;Rang ${item.rank} / 20&lt;/span&gt;&lt;/div&gt;&lt;h2&gt;${escapeHtml(item.name)}&lt;/h2&gt;&lt;p class=&quot;text-muted&quot;&gt;${escapeHtml(item.angle)}&lt;/p&gt;&lt;/div&gt;
          &lt;span class=&quot;ds-pill ds-pill-primary&quot;&gt;Potentiel venture · ${item.score}/100&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;ds-thesis&quot;&gt;&lt;strong&gt;Wedge initial&lt;/strong&gt;&lt;p&gt;${escapeHtml(item.wedge)}&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;ds-detail-grid&quot;&gt;
          &lt;div class=&quot;ds-info&quot;&gt;&lt;span&gt;Premier client&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.customer)}&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;ds-info&quot;&gt;&lt;span&gt;Prix de départ&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.price)}&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;ds-info&quot;&gt;&lt;span&gt;Métrique nord&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.north)}&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;ds-info&quot;&gt;&lt;span&gt;Why now&lt;/span&gt;${escapeHtml(item.why)}&lt;/div&gt;
          &lt;div class=&quot;ds-info&quot;&gt;&lt;span&gt;Risque à tuer&lt;/span&gt;${escapeHtml(item.risk)}&lt;/div&gt;
          &lt;div class=&quot;ds-info&quot;&gt;&lt;span&gt;Objectif à 12 mois&lt;/span&gt;${escapeHtml(item.milestone)}&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;ds-thesis&quot;&gt;&lt;strong&gt;Chemin d’expansion&lt;/strong&gt;&lt;p&gt;${escapeHtml(item.expansion)}&lt;/p&gt;&lt;/div&gt;
        &lt;div class=&quot;viz-row&quot;&gt;&lt;p&gt;&lt;strong&gt;Test avant code · 30 jours&lt;/strong&gt;&lt;br&gt;${escapeHtml(item.test)}&lt;/p&gt;${hasDetailedPlan ? `&lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot; data-open-validation=&quot;${item.id}&quot;&gt;Voir le plan détaillé&lt;/button&gt;` : &#x27;&#x27;}&lt;/div&gt;`;
      if (announce) detail.setAttribute(&#x27;data-updated&#x27;, String(Date.now()));
      detail.querySelectorAll(&#x27;[data-open-validation]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; openValidation(Number(button.dataset.openValidation))));
    }

    function metricMarkup(value, color) {
      return `&lt;span class=&quot;ds-mini-track&quot; style=&quot;--ds-cat:${color};--metric-width:${value * 20}%&quot;&gt;&lt;span&gt;&lt;i&gt;&lt;/i&gt;&lt;/span&gt;&lt;strong&gt;${value}/5&lt;/strong&gt;&lt;/span&gt;`;
    }

    function renderComparison() {
      const body = root.querySelector(&#x27;#ds-compare-body&#x27;);
      const cards = root.querySelector(&#x27;#ds-compare-cards&#x27;);
      body.innerHTML = comparison.map(item =&gt; {
        const color = series(item.color);
        return `&lt;tr style=&quot;--ds-cat:${color}&quot;&gt;&lt;td&gt;&lt;button class=&quot;btn btn-ghost ds-rank-btn&quot; type=&quot;button&quot; data-compare-yc=&quot;${item.id}&quot;&gt;&lt;strong&gt;#${item.id} ${escapeHtml(item.name)}&lt;/strong&gt;&lt;/button&gt;&lt;/td&gt;&lt;td class=&quot;ds-metric-cell&quot;&gt;${metricMarkup(item.validation,color)}&lt;/td&gt;&lt;td class=&quot;ds-metric-cell&quot;&gt;${metricMarkup(item.world,color)}&lt;/td&gt;&lt;td class=&quot;ds-metric-cell&quot;&gt;${metricMarkup(item.moat,color)}&lt;/td&gt;&lt;td class=&quot;ds-metric-cell&quot;&gt;${metricMarkup(item.complexity,color)}&lt;/td&gt;&lt;td class=&quot;ds-metric-cell&quot;&gt;${metricMarkup(item.regulation,color)}&lt;/td&gt;&lt;td class=&quot;ds-metric-cell&quot;&gt;${metricMarkup(item.solo,color)}&lt;/td&gt;&lt;td class=&quot;ds-score&quot;&gt;${item.score.toFixed(2).replace(&#x27;.&#x27;, &#x27;,&#x27;)}/5&lt;/td&gt;&lt;/tr&gt;`;
      }).join(&#x27;&#x27;);
      cards.innerHTML = comparison.map((item, index) =&gt; {
        const color = series(item.color);
        return `&lt;article class=&quot;card ds-compare-card&quot; style=&quot;--ds-cat:${color}&quot;&gt;&lt;div class=&quot;ds-detail-head&quot;&gt;&lt;h3&gt;${index + 1}. #${item.id} ${escapeHtml(item.name)}&lt;/h3&gt;&lt;span class=&quot;ds-pill ds-pill-primary&quot;&gt;${item.score.toFixed(2).replace(&#x27;.&#x27;, &#x27;,&#x27;)}/5&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;ds-compare-list&quot;&gt;&lt;div class=&quot;ds-compare-row&quot;&gt;&lt;span&gt;Validation&lt;/span&gt;${metricMarkup(item.validation,color)}&lt;/div&gt;&lt;div class=&quot;ds-compare-row&quot;&gt;&lt;span&gt;Marché mondial&lt;/span&gt;${metricMarkup(item.world,color)}&lt;/div&gt;&lt;div class=&quot;ds-compare-row&quot;&gt;&lt;span&gt;Moat données&lt;/span&gt;${metricMarkup(item.moat,color)}&lt;/div&gt;&lt;div class=&quot;ds-compare-row&quot;&gt;&lt;span&gt;Complexité ↓&lt;/span&gt;${metricMarkup(item.complexity,color)}&lt;/div&gt;&lt;div class=&quot;ds-compare-row&quot;&gt;&lt;span&gt;Réglementation ↓&lt;/span&gt;${metricMarkup(item.regulation,color)}&lt;/div&gt;&lt;div class=&quot;ds-compare-row&quot;&gt;&lt;span&gt;Fit solo&lt;/span&gt;${metricMarkup(item.solo,color)}&lt;/div&gt;&lt;/div&gt;&lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot; data-compare-yc=&quot;${item.id}&quot;&gt;Voir la thèse&lt;/button&gt;&lt;/article&gt;`;
      }).join(&#x27;&#x27;);
      root.querySelectorAll(&#x27;[data-compare-yc]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; {

    function renderValidationPlans() {
      const container = root.querySelector(&#x27;#ds-validation-list&#x27;);

          &lt;div class=&quot;ds-week-grid&quot;&gt;${plan.weeks.map((week, weekIndex) =&gt; `&lt;div class=&quot;ds-week&quot;&gt;&lt;strong&gt;Semaine ${weekIndex + 1}&lt;/strong&gt;&lt;p&gt;${escapeHtml(week)}&lt;/p&gt;&lt;/div&gt;`).join(&#x27;&#x27;)}&lt;/div&gt;
        &lt;/details&gt;`).join(&#x27;&#x27;);
    }

    function openValidation(id) {
      openView(&#x27;plan&#x27;, true);
      const plan = root.querySelector(`[data-validation=&quot;${id}&quot;]`);
      if (plan) {
        plan.open = true;
        plan.scrollIntoView({behavior:&#x27;smooth&#x27;, block:&#x27;start&#x27;});
      }
    }

    function initCategories() {
      categories.forEach(category =&gt; {
        const option = document.createElement(&#x27;option&#x27;);
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      });
    }

    function filterAndRenderIdeas(reset = true) {
      if (reset) visibleIdeas = 20;
      const query = searchInput.value.trim().toLocaleLowerCase(&#x27;fr&#x27;);
      const category = categorySelect.value;
      const market = marketSelect.value;
      const maxDifficulty = Number(difficultySelect.value);
      filteredIdeas = ideas.filter(item =&gt; {
        const haystack = `${item.name} ${item.category} ${item.summary} ${item.pain} ${item.target} ${item.gap} ${item.moat}`.toLocaleLowerCase(&#x27;fr&#x27;);
        return (!query || haystack.includes(query)) &amp;&amp; (!category || item.category === category) &amp;&amp; (!market || item.market.includes(market)) &amp;&amp; item.diff &lt;= maxDifficulty;
      });
      const shown = filteredIdeas.slice(0, visibleIdeas);
      count.textContent = `${filteredIdeas.length} résultat${filteredIdeas.length &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;} · ${shown.length} affiché${shown.length &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;}`;
      const activeFilters = Number(Boolean(category)) + Number(Boolean(market)) + Number(maxDifficulty &lt; 5);
      filterCount.textContent = activeFilters ? `· ${activeFilters} actif${activeFilters &gt; 1 ? &#x27;s&#x27; : &#x27;&#x27;}` : &#x27;&#x27;;
      ideaList.innerHTML = shown.length ? shown.map(item =&gt; {
        const categoryIndex = categories.indexOf(item.category) + 1;
        return `&lt;details class=&quot;ds-idea&quot; style=&quot;--ds-cat:${series(categoryIndex)}&quot;&gt;
          &lt;summary&gt;&lt;span class=&quot;ds-idea-title&quot;&gt;&lt;strong&gt;#${item.id} ${escapeHtml(item.name)}&lt;/strong&gt;&lt;span&gt;${escapeHtml(item.summary)}&lt;/span&gt;&lt;span class=&quot;ds-idea-meta&quot;&gt;${escapeHtml(item.category)} · ${escapeHtml(item.market)} · difficulté ${item.diff}/5 · premier client ${escapeHtml(item.time)}&lt;/span&gt;&lt;/span&gt;&lt;/summary&gt;
          &lt;div class=&quot;ds-idea-body&quot;&gt;
            &lt;p&gt;&lt;strong&gt;Problème précis&lt;/strong&gt;&lt;br&gt;${escapeHtml(item.pain)}&lt;/p&gt;
            &lt;p&gt;&lt;strong&gt;Payeur et canal&lt;/strong&gt;&lt;br&gt;${escapeHtml(item.target)}&lt;/p&gt;
            &lt;p&gt;&lt;strong&gt;Prix suggéré&lt;/strong&gt;&lt;br&gt;${escapeHtml(item.price)}&lt;/p&gt;
            &lt;p&gt;&lt;strong&gt;Marché&lt;/strong&gt;&lt;br&gt;${escapeHtml(item.market)}&lt;/p&gt;
            &lt;p&gt;&lt;strong&gt;Concurrents + le trou&lt;/strong&gt;&lt;br&gt;${escapeHtml(item.gap)}&lt;/p&gt;
            &lt;p&gt;&lt;strong&gt;Moat&lt;/strong&gt;&lt;br&gt;${escapeHtml(item.moat)}&lt;/p&gt;
          &lt;/div&gt;
        &lt;/details&gt;`;
      }).join(&#x27;&#x27;) : &#x27;&lt;p class=&quot;ds-no-results&quot;&gt;Aucune idée ne correspond à ces critères. Essaie un métier ou enlève un filtre.&lt;/p&gt;&#x27;;
      loadMore.hidden = shown.length &gt;= filteredIdeas.length;
    }

    function initProofChecklist() {
      const inputs = [...root.querySelectorAll(&#x27;[data-proof]&#x27;)];
      let saved = [];
      try { saved = JSON.parse(localStorage.getItem(&#x27;yc-launch-proof-v1&#x27;) || &#x27;[]&#x27;); } catch (error) { saved = []; }
      inputs.forEach(input =&gt; { input.checked = saved.includes(input.dataset.proof); });
      const update = () =&gt; {
        const checked = inputs.filter(input =&gt; input.checked);
        root.querySelector(&#x27;#ds-proof-count&#x27;).textContent = `${checked.length} / ${inputs.length}`;
        root.querySelector(&#x27;#ds-proof-bar&#x27;).style.setProperty(&#x27;--progress&#x27;, `${(checked.length / inputs.length) * 100}%`);
        try { localStorage.setItem(&#x27;yc-launch-proof-v1&#x27;, JSON.stringify(checked.map(input =&gt; input.dataset.proof))); } catch (error) { /* stockage indisponible */ }
      };
      inputs.forEach(input =&gt; input.addEventListener(&#x27;change&#x27;, update));
      update();
    }

    root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; openView(button.dataset.view)));
    root.querySelectorAll(&#x27;[data-jump]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; openView(button.dataset.jump, true)));
    root.querySelectorAll(&#x27;[data-open-yc]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; {
      openView(&#x27;yc&#x27;, true);
      selectYc(Number(button.dataset.openYc));
    }));
    root.querySelector(&#x27;#ds-print&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; window.print());
    searchInput.addEventListener(&#x27;input&#x27;, () =&gt; filterAndRenderIdeas(true));
    [categorySelect, marketSelect, difficultySelect].forEach(control =&gt; control.addEventListener(&#x27;change&#x27;, () =&gt; filterAndRenderIdeas(true)));
    loadMore.addEventListener(&#x27;click&#x27;, () =&gt; { visibleIdeas += 20; filterAndRenderIdeas(false); });
    root.querySelector(&#x27;#ds-clear-filters&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
      searchInput.value = &#x27;&#x27;;
      categorySelect.value = &#x27;&#x27;;
      marketSelect.value = &#x27;&#x27;;
      difficultySelect.value = &#x27;5&#x27;;
      filterAndRenderIdeas(true);
    });

    initCategories();
    renderYcList();
    selectYc(73);
    renderComparison();
    renderValidationPlans();
    filterAndRenderIdeas(true);
    initProofChecklist();
    openView(&#x27;home&#x27;);
  })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {

    window.FloatingUIDOM;

  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;

  let autoUpdateCleanup = null;

    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)

    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {

      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

  };

      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)

    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,

            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,

            );

        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {

        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };

    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;

        ? 0

      return;

      openTimeout = null;

  };

    if (event.pointerType === &quot;touch&quot;) {

    }

    }

    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);

    if (event.key === &quot;Escape&quot;) {

  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {

    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);

  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
